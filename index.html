<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream Global - Full IPTV Playlist Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --accent-color: #3b82f6;
            --gradient-accent: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 40px; }

        header {
            background: rgba(19, 26, 38, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-loaded { font-size: 13px; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 5px 12px; border-radius: 20px; font-weight: 600; }

        .player-container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        .video-wrapper {
            position: relative;
            padding-top: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; outline: none; }

        .now-playing { margin-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .now-playing h2 { font-size: 18px; font-weight: 600; color: #3b82f6; }
        .live-badge { background: #ef4444; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; animation: blink 1.5s infinite; }

        .controls-section { max-width: 1000px; margin: 25px auto; padding: 0 15px; display: flex; gap: 10px; }
        
        .search-box { position: relative; flex: 1; }
        .search-box input {
            width: 100%; padding: 14px 20px; padding-left: 45px; background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; color: white; font-size: 15px; outline: none;
        }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .filter-select {
            padding: 0 15px; background: var(--card-bg); color: white; border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; outline: none; cursor: pointer; font-size: 14px; min-width: 150px;
        }

        .grid-container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .channel-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 14px;
            padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px;
            height: 100%; justify-content: space-between;
        }
        .channel-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.3); }
        
        .channel-logo-img { width: 60px; height: 60px; object-fit: contain; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 12px; }
        .no-logo { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text-muted); }
        
        .channel-name { font-size: 13px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 38px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media(max-width: 600px) { .channel-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-globe"></i>SOHEL IP TV</div>
        <div class="status-loaded" id="totalCount">Loading channels...</div>
    </header>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoPlayer" controls autoplay muted playsinline></video>
        </div>
        <div class="now-playing">
            <h2 id="currentChannelName">Select a Channel</h2>
            <span class="live-badge" id="liveBadge" style="display:none;">LIVE</span>
        </div>
    </div>

    <div class="controls-section">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchBar" placeholder="Search from all channels..." onkeyup="filterChannels()">
        </div>
        <select id="countryFilter" class="filter-select" onchange="filterChannels()">
            <option value="all">All Channels</option>
            <option value="Bangladesh">Bangladesh Only 🇧🇩</option>
        </select>
    </div>

    <div class="grid-container">
        <div class="channel-grid" id="channelGrid"></div>
    </div>

    <script>
        // giaanqn95 এবং iptv-org এর অফিশিয়াল গ্লোবাল প্লেলিস্ট লিঙ্ক
        const PLAYLIST_URL = "https://iptv-org.github.io/iptv/index.m3u";
        
        let allChannels = [];
        const videoPlayer = document.getElementById('videoPlayer');
        let currentHls = null;

        // M3U প্লেলিস্ট ফাইল লাইভ ফেচ এবং পার্স করার ফাংশন
        async function fetchPlaylist() {
            try {
                const response = await fetch(PLAYLIST_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.text();
                parseM3U(data);
            } catch (error) {
                document.getElementById('totalCount').innerText = "Error loading list. Check CORS!";
                console.error("Error fetching playlist:", error);
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    
                    // নাম এক্সট্রাক্ট করা
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1].trim() : "Unknown Channel";
                    
                    // লোগো এক্সট্রাক্ট করা
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                    
                    // দেশ এক্সট্রাক্ট করা (যদি থাকে) বা ডিফল্ট ক্যাটাগরি সেট করা
                    // বাংলাদেশ চ্যানেল চেনার জন্য নামের প্যাটার্ন ট্র্যাক করা
                    if (currentChannel.name.toLowerCase().includes('bangla') || currentChannel.name.toLowerCase().includes('bd') || currentChannel.name.toLowerCase().includes('dhaka')) {
                        currentChannel.isBD = true;
                    } else {
                        currentChannel.isBD = false;
                    }
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    allChannels.push(currentChannel);
                    currentChannel = null;
                }
            }

            document.getElementById('totalCount').innerText = `${allChannels.length} Channels Loaded`;
            filterChannels();
            
            // অটোমেটিক প্রথম সচল চ্যানেল প্লে করা
            if (allChannels.length > 0) {
                playChannel(allChannels[0]);
            }
        }

        function filterChannels() {
            const searchText = document.getElementById('searchBar').value.toLowerCase();
            const selectedFilter = document.getElementById('countryFilter').value;
            
            const filtered = allChannels.filter(channel => {
                const matchesSearch = channel.name.toLowerCase().includes(searchText);
                const matchesCountry = (selectedFilter === 'all' || (selectedFilter === 'Bangladesh' && channel.isBD));
                return matchesSearch && matchesCountry;
            });

            renderGrid(filtered);
        }

        function renderGrid(channelsToRender) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = '';

            if (channelsToRender.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted);">No channels found.</p>`;
                return;
            }

            // পারফরম্যান্স ঠিক রাখতে একবারে সর্বোচ্চ ২০০টি চ্যানেল রেন্ডার করা হচ্ছে
            const limitList = channelsToRender.slice(0, 200);

            limitList.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(channel);
                
                const logoHtml = channel.logo ? 
                    `<img class="channel-logo-img" src="${channel.logo}" onerror="this.onerror=null; this.outerHTML='<div class=no-logo>📺</div>';">` : 
                    `<div class="no-logo">📺</div>`;

                card.innerHTML = `${logoHtml}<div class="channel-name">${channel.name}</div>`;
                grid.appendChild(card);
            });
        }

        function playChannel(channel) {
            document.getElementById('currentChannelName').innerText = "Playing: " + channel.name;
            document.getElementById('liveBadge').style.display = 'inline-block';

            if (currentHls) { currentHls.destroy(); }

            if (Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(channel.url);
                currentHls.attachMedia(videoPlayer);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play().catch(e => console.log("Autoplay caught")));
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = channel.url;
                videoPlayer.addEventListener('loadedmetadata', () => videoPlayer.play().catch(e => console.log("Autoplay caught")));
            }
        }

        window.onload = () => {
            fetchPlaylist();
        };
    </script>
</body>
</html>
